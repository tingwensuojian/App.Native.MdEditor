<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%markdown.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Markdown 编辑器</title>
    <!-- KaTeX CSS for math rendering - 使用本地包，避免 CDN integrity 问题 -->
    <!-- MathJax 用于微信导出时将数学公式渲染为纯 SVG -->
    <script>
      window.MathJax = {
        tex: { tags: 'ams' },
        svg: { fontCache: 'none' },
        startup: { typeset: false }
      };
    </script>
    <script id="MathJax-script" async src="%BASE_URL%mathjax/tex-svg.js"></script>
    <!-- 预加载默认代码主题，移动端切换预览时立即可用 -->
    <link id="code-theme-style" rel="stylesheet" href="%BASE_URL%code-themes/github.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="%BASE_URL%src/main.jsx"></script>
  </body>
</html>
